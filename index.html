<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ذكرى غالية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff4d6d;
            --bg-color: #000000;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Cairo', sans-serif;
            overflow: hidden; /* مقفول في البداية */
            scroll-behavior: smooth;
        }

        /* شاشة الوردة */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            cursor: pointer;
        }

        .big-rose { font-size: 120px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* الأقسام - كل قسم بعيد عن التاني */
        section {
            min-height: 100vh; /* طول الشاشة بالكامل */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
            box-sizing: border-box;
            position: relative;
        }

        #main-content { display: none; }

        /* ستايل العداد الأسطوري */
        .counter-val {
            font-size: clamp(70px, 15vw, 100px);
            font-weight: 900;
            color: #ffffff;
            display: block;
            line-height: 1;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        .counter-label {
            font-size: 20px;
            color: var(--primary-color);
            margin-bottom: 40px;
            font-weight: bold;
        }
        .timer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        /* أنيميشن الظهور عند السكرول */
        .reveal {
            opacity: 0;
            transform: translateY(50px);
            transition: all 1.2s ease-out;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .flower-rain {
            position: fixed;
            color: rgba(255, 77, 109, 0.4);
            font-size: 20px;
            animation: fall 6s linear forwards;
            z-index: -1;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        .photo-frame img {
            width: 85%;
            max-width: 350px;
            border: 6px solid white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(255, 77, 109, 0.2);
        }

        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            font-size: 30px;
            animation: bounce 1.5s infinite;
            color: var(--primary-color);
        }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }
    </style>
</head>
<body>

    <div id="start-screen" onclick="startStory()">
        <div class="big-rose">🌹</div>
    </div>

    <div id="main-content">
        <section>
            <h1 style="color: var(--primary-color); margin-bottom: 50px;">كل ثانية وإنتي معايا ❤️</h1>
            <div class="timer-grid">
                <div class="time-box"><span class="counter-val" id="days">0</span><span class="counter-label">يوم</span></div>
                <div class="time-box"><span class="counter-val" id="hours">0</span><span class="counter-label">ساعة</span></div>
                <div class="time-box"><span class="counter-val" id="minutes">0</span><span class="counter-label">دقيقة</span></div>
                <div class="time-box"><span class="counter-val" id="seconds">0</span><span class="counter-label">ثانية</span></div>
            </div>
            <p style="margin-top: 40px; color: #666;">انزلي تحت لسه فيه مفاجآت..</p>
            <div class="scroll-indicator">🔽</div>
        </section>

        <section class="reveal">
            <div class="photo-frame">
                <img src="https://via.placeholder.com/400x500/ff4d6d/ffffff?text=Our+Memory">
            </div>
            <h2 style="margin-top: 30px;">من يوم 10/9/2025 وحياتي أجمل</h2>
            <div class="scroll-indicator">🔽</div>
        </section>

        <section class="reveal">
            <div style="background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 30px; border-left: 5px solid var(--primary-color);">
                <p style="font-size: 24px; line-height: 1.8; max-width: 300px;">
                    حبيبتي.. <br>
                    انتي الوردة اللي بجد في عمري، <br>
                    كل سنة وانتي منورة دنيتي.
                </p>
            </div>
            <div class="scroll-indicator">🔽</div>
        </section>

        <section class="reveal">
            <div style="font-size: 150px;">🎂</div>
            <h1 style="font-size: 45px; color: var(--primary-color); text-shadow: 0 0 20px var(--primary-color);">
                كل سنة وإنتي طيبة <br>
                وكل سنة وأنا معاكي ❤️
            </h1>
        </section>
    </div>

    <script>
        function startStory() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.body.style.overflowY = 'auto';
                startFlowerRain();
                handleScrollReveal(); // تفعيل أنيميشن السكرول
            }, 800);
        }

        // العداد
        const startDate = new Date("September 10, 2025 00:00:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const diff = now - startDate;
            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }, 1000);

        // أنيميشن الظهور عند السكرول
        function handleScrollReveal() {
            const reveals = document.querySelectorAll('.reveal');
            window.addEventListener('scroll', () => {
                reveals.forEach(window_reveal => {
                    const windowHeight = window.innerHeight;
                    const revealTop = window_reveal.getBoundingClientRect().top;
                    if (revealTop < windowHeight - 150) {
                        window_reveal.classList.add('active');
                    }
                });
            });
        }

        // مطر الورد
        function startFlowerRain() {
            setInterval(() => {
                const f = document.createElement('div');
                f.classList.add('flower-rain');
                f.innerHTML = '🌹';
                f.style.left = Math.random() * 100 + 'vw';
                document.body.appendChild(f);
                setTimeout(() => f.remove(), 6000);
            }, 400);
        }
    </script>
</body>
</html>
