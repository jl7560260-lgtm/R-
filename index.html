<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيد ميلاد سعيد</title>
    <style>
        :root {
            --primary-color: #ff4d6d;
            --bg-color: #000000;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Cairo', sans-serif;
            overflow: hidden; /* مقفول في البداية */
        }

        /* شاشة الوردة */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
        }

        .big-rose { font-size: 100px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* الأقسام (كل قسم واخد طول الشاشة) */
        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #main-content { display: none; }

        /* ستايل العداد الجديد (أبيض وكبير) */
        .counter-val {
            font-size: 60px;
            font-weight: 900;
            color: #ffffff;
            display: block;
            line-height: 1;
        }
        .counter-label {
            font-size: 18px;
            color: var(--primary-color);
            margin-bottom: 20px;
        }
        .timer-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
        }

        /* مطر الورد */
        .flower-rain {
            position: fixed;
            color: rgba(255, 77, 109, 0.4);
            font-size: 20px;
            animation: fall 5s linear forwards;
            z-index: -1;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        .photo-gallery img {
            width: 80%;
            max-width: 300px;
            border: 4px solid white;
            border-radius: 15px;
            margin: 10px;
        }

        .scroll-hint {
            position: absolute;
            bottom: 20px;
            animation: upDown 1.5s infinite;
            font-size: 24px;
        }
        @keyframes upDown { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <div id="start-screen" onclick="startStory()">
        <div class="big-rose">🌹</div>
    </div>

    <div id="main-content">
        <section>
            <h1 style="color: var(--primary-color);">كل ثانية وإنتي معايا ❤️</h1>
            <p>إحنا مع بعض من 10/9/2025</p>
            <div class="timer-grid">
                <div class="time-box"><span class="counter-val" id="days">0</span><span class="counter-label">يوم</span></div>
                <div class="time-box"><span class="counter-val" id="hours">0</span><span class="counter-label">ساعة</span></div>
                <div class="time-box"><span class="counter-val" id="minutes">0</span><span class="counter-label">دقيقة</span></div>
                <div class="time-box"><span class="counter-val" id="seconds">0</span><span class="counter-label">ثانية</span></div>
            </div>
            <div class="scroll-hint">🔽 انزلي تحت</div>
        </section>

        <section>
            <div class="photo-gallery">
                <img src="https://via.placeholder.com/300">
            </div>
            <p style="font-size: 20px; max-width: 80%;">
                حبيبتي.. كل سنة وإنتي منورة حياتي، إنتي الوردة اللي بجد في عمري.
            </p>
            <div class="scroll-hint">🔽 لسه فيه حاجة</div>
        </section>

        <section>
            <h2 style="font-size: 40px; color: var(--primary-color);">
                كل سنة وإنتي طيبة..<br>وكل سنة وأنا معاكي ❤️
            </h2>
        </section>
    </div>

    <script>
        function startStory() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.body.style.overflowY = 'auto'; // فتح السكرول
            startFlowerRain();
        }

        const startDate = new Date("September 10, 2025 00:00:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const diff = now - startDate;
            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }, 1000);

        function startFlowerRain() {
            setInterval(() => {
                const f = document.createElement('div');
                f.classList.add('flower-rain');
                f.innerHTML = '🌹';
                f.style.left = Math.random() * 100 + 'vw';
                document.body.appendChild(f);
                setTimeout(() => f.remove(), 5000);
            }, 300);
        }
    </script>
</body>
</html>
