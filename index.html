<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيد ميلاد سعيد يا أغلى الناس</title>
    <style>
        :root {
            --primary-color: #ff4d6d;
            --bg-color: #0f0f0f;
            --text-color: #f0f0f0;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* شاشة البداية (الوردة الكبيرة) */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
            transition: opacity 1s ease-out;
        }

        .big-rose {
            font-size: 150px;
            animation: roseFloat 2s ease-in-out infinite;
            text-shadow: 0 0 30px var(--primary-color);
        }

        @keyframes roseFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.1); }
        }

        /* شاشة المحتوى الرئيسي */
        #main-content {
            display: none;
            opacity: 0;
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            transition: opacity 1s ease-in;
        }

        .flower-rain {
            position: fixed;
            color: rgba(255, 77, 109, 0.5);
            font-size: 25px;
            animation: fall linear forwards;
            z-index: -1;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        h1 { font-size: 32px; color: var(--primary-color); margin-bottom: 5px; }
        h2 { font-size: 20px; color: #ccc; margin-top: 0; font-weight: normal; }

        /* العداد */
        .timer-container {
            background: rgba(255, 77, 109, 0.1);
            padding: 15px;
            border-radius: 15px;
            margin: 20px 0;
            border: 1px solid rgba(255, 77, 109, 0.3);
        }

        .timer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .time-box span {
            display: block;
            font-size: 20px;
            font-weight: bold;
            color: var(--primary-color);
        }

            padding-bottom: 10px;
            margin: 15px 0;
