<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيد ميلاد سعيد</title>
    <style>
        :root {
            --primary-color: #ff4d6d;
            --bg-color: #0f0f0f;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* شاشة البداية */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
        }

        .big-rose {
            font-size: 120px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* العناصر المخفية في البداية */
        .step {
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s ease;
            margin-bottom: 30px;
        }

        .show {
            opacity: 1;
            transform: translateY(0);
        }

        #main-content {
            display: none;
            text-align: center;
            padding: 20px;
            width: 100%;
        }

        .flower-rain {
            position: fixed;
            color: rgba(255, 77, 109, 0.4);
            font-size: 20px;
            animation: fall 4s linear forwards;
            z-index: -1;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* تنسيق العداد */
        .timer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
        }

        .time-box span {
            display: block;
            font-size: 22px;
            color: var(--primary-color);
            font-weight: bold;
        }

        .photo-gallery img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid var(--primary-color);
            margin: 5px;
        }
    </style>
</head>
<body>

    <div id="start-screen" onclick="startStory()">
        <div class="big-rose">🌹</div>
    </div>

    <div id="main-content">
        <h1 class="step" id="step1">كل ثانية وإنتي معايا ❤️</h1>
        
        <div class="step" id="step2">
            <p>إحنا مع بعض من 10/9/2025</p>
            <div class="timer-grid">
                <div class="time-box"><span id="days">0</span>يوم</div>
                <div class="time-box"><span id="hours">0</span>ساعة</div>
                <div class="time-box"><span id="minutes">0</span>دقيقة</div>
                <div class="time-box"><span id="seconds">0</span>ثانية</div>
            </div>
        </div>

        <div class="step" id="step3">
            <div class="photo-gallery">
                <img src="https://via.placeholder.com/150">
                <img src="https://via.placeholder.com/150">
            </div>
        </div>

        <h2 class="step" id="step4" style="color: var(--primary-color);">
            كل سنة وإنتي طيبة.. وكل سنة وأنا معاكي
        </h2>
    </div>

    <script>
        function startStory() {
            // إخفاء الوردة
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            startFlowerRain();

            // إظهار الخطوات بتوقيتات مختلفة
            setTimeout(() => { document.getElementById('step1').classList.add('show'); }, 500);
            setTimeout(() => { document.getElementById('step2').classList.add('show'); }, 2500);
            setTimeout(() => { document.getElementById('step3').classList.add('show'); }, 4500);
            setTimeout(() => { document.getElementById('step4').classList.add('show'); }, 6500);
        }

        // كود العداد
        const startDate = new Date("September 10, 2025 00:00:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const diff = now - startDate;
            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }, 1000);

        // كود مطر الورد
        function startFlowerRain() {
            setInterval(() => {
                const f = document.createElement('div');
                f.classList.add('flower-rain');
                f.innerHTML = '🌹';
                f.style.left = Math.random() * 100 + 'vw';
                document.body.appendChild(f);
                setTimeout(() => f.remove(), 4000);
            }, 300);
        }
    </script>
</body>
</html>
