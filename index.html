<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيد ميلاد سعيد يا أغلى الناس</title>
    <style>
        /* CSS - التصميم */
        :root {
            --primary-color: #ff4d6d; /* لون الورد والقلوب */
            --bg-color: #0f0f0f; /* خلفية سوداء فخمة */
            --text-color: #f0f0f0;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* لمنع السكرول قبل الضغط */
        }

        /* شاشة البداية (الوردة الكبيرة) */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
            transition: opacity 1s ease-out;
        }

        .big-rose {
            font-size: 150px;
            animation: roseFloat 2s ease-in-out infinite;
            text-shadow: 0 0 30px var(--primary-color);
        }

        @keyframes roseFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.1); }
        }

        /* شاشة المحتوى الرئيسي (مخفية في البداية) */
        #main-content {
            display: none;
            opacity: 0;
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            transition: opacity 1s ease-in;
        }

        /* أنيميشن مطر الورد والقلوب */
        .flower-rain {
            position: fixed;
            color: rgba(255, 77, 109, 0.5);
            font-size: 25px;
            animation: fall linear forwards;
            z-index: -1;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        h1 { font-size: 32px; color: var(--primary-color); margin-bottom: 5px; }
        h2 { font-size: 20px; color: #ccc; margin-top: 0; font-weight: normal; }

        /* العداد */
        .timer-container {
            background: rgba(255, 77, 109, 0.1);
            padding: 15px;
            border-radius: 15px;
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* العداد (Timer) */
        .timer-container {
            margin-top: 50px;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--primary-color);
            box-shadow: 0 0 15px var(--primary-color);
        }

        .timer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .time-box span {
            display: block;
            font-size: 25px;
            font-weight: bold;
            color: var(--primary-color);
        }

        /* معرض الصور (Slider بسيط) */
        .photo-frame {
            margin: 40px 0;
            width: 250px;
            height: 250px;
            border: 5px solid white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: float 3s ease-in-out infinite;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* القلب الكبير */
        .big-heart {
            font-size: 80px;
            color: var(--primary-color);
            animation: pulse 1s infinite;
            margin: 20px 0;
        }

        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 10px var(--primary-color); }
            50% { transform: scale(1.2); text-shadow: 0 0 30px var(--primary-color); }
            100% { transform: scale(1); text-shadow: 0 0 10px var(--primary-color); }
        }

        h2 { margin: 10px 0; font-size: 22px; text-align: center; padding: 0 20px; }
    </style>
</head>
<body>

    <div class="timer-container">
        <h2>بقالنا مع بعض</h2>
        <div class="timer-grid">
            <div class="time-box"><span id="days">0</span>يوم</div>
            <div class="time-box"><span id="hours">0</span>ساعة</div>
            <div class="time-box"><span id="minutes">0</span>دقيقة</div>
            <div class="time-box"><span id="seconds">0</span>ثانية</div>
        </div>
    </div>

    <div class="photo-frame">
        <img src="https://via.placeholder.com/250x250/ff4d6d/ffffff?text=Your+Photo" id="slideshow">
    </div>

    <div class="big-heart">❤️</div>
    
    <h2>أنتي أجمل حاجة حصلت في دنيتي</h2>

    <script>
        // 1. العداد (غير التاريخ ده لتاريخ جوازكم أو أول مقابلة)
        const startDate = new Date("September 10, 2025 00:00:00").getTime();

        setInterval(function() {
            const now = new Date().getTime();
            const diff = now - startDate;

            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }, 1000);

        // 2. أنيميشن القلوب المتساقطة
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-bg');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
        setInterval(createHeart, 300);

        // 3. تبديل الصور (لو حطيت كذا صورة)
        const images = [
            "https://via.placeholder.com/250x250/ff4d6d/ffffff?text=Photo+1",
            "https://via.placeholder.com/250x250/000000/ffffff?text=Photo+2"
        ];
        let i = 0;
        setInterval(() => {
            i = (i + 1) % images.length;
            document.getElementById("slideshow").src = images[i];
        }, 3000);
    </script>
</body>
</html>
