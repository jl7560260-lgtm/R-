<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Jar</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&family=Reenie+Beanie&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff4d6d; --bg: #000000; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Cairo', sans-serif; overflow-x: hidden; text-align: center; }

        section { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        /* ستايل الصندوق الزجاجي */
        .jar {
            width: 150px; height: 200px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px 10px 50px 50px;
            background: rgba(255, 255, 255, 0.05);
            position: relative; cursor: pointer;
            transition: 0.3s;
        }
        .jar:hover { transform: scale(1.05); border-color: var(--primary); }
        .jar::after { content: '🎁'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 40px; }

        /* تأثير الورقة اللي بتفتح (مثل الصور) */
        #paper-container {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); z-index: 3000;
        }

        .folded-paper {
            width: 280px; min-height: 150px;
            background: #fffbe6; color: #333;
            padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            position: relative;
            transform-origin: left;
            animation: openPaper 1s forwards; /* أنيميشن الفتح */
            font-family: 'Reenie Beanie', cursive;
            font-size: 30px; line-height: 1.2;
        }

        @keyframes openPaper {
            0% { transform: scaleX(0); opacity: 0; }
            100% { transform: scaleX(1); opacity: 1; }
        }

        .heart-icon { color: var(--primary); font-size: 40px; margin-bottom: 10px; opacity: 0; animation: fadeIn 0.5s 1s forwards; }
        .message-text { opacity: 0; animation: fadeIn 0.8s 1.5s forwards; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; }
        
        .close-hint { font-size: 14px; color: #888; margin-top: 20px; font-family: 'Cairo'; }
    </style>
</head>
<body>

    <section>
        <h1 style="color: var(--primary);">Every second with you is a gift ❤️</h1>
        <div id="days" style="font-size: 80px; font-weight: 900;">0</div>
        <p>Days of Love</p>
        <p style="margin-top: 100px;">Scroll down for your jar.. 👇</p>
    </section>

    <section>
        <h2 style="margin-bottom: 40px;">Your Memory Jar 🍯</h2>
        <div class="jar" onclick="popMessage()"></div>
        <p style="margin-top: 20px; color: #666;">Tap the jar to open a note</p>
    </section>

    <div id="overlay" onclick="closeMessage()"></div>
    <div id="paper-container" id="paper-anim">
        <div class="folded-paper">
            <div class="heart-icon">💜</div>
            <div class="message-text" id="msg"></div>
            <div class="close-hint">Tap anywhere to close</div>
        </div>
    </div>

    <script>
        const messages = [
            "Among 8 billion people, I was lucky enough to meet the most beautiful and good.",
            "You have no idea how much I miss you right now and how badly I want to see and hug you.",
            "You are the one I want to spend my life with. You are my forever love.",
            "I will choose you over and over, without a pause, without a doubt, in a heartbeat.",
            "Meeting you was like listening to a song for the first time and knowing it would be my favorite."
        ];

        function popMessage() {
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            document.getElementById('msg').innerText = randomMsg;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('paper-container').style.display = 'block';
        }

        function closeMessage() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('paper-container').style.display = 'none';
        }

        // العداد
        const start = new Date("September 10, 2025").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            document.getElementById("days").innerText = Math.floor((now - start) / (1000 * 60 * 60 * 24));
        }, 1000);
    </script>
</body>
</html>
